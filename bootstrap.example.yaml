# Bootstrap a ma runtime with entities.
#
# Run once before starting the daemon:
#
#   ma --gen-root-cid bootstrap.example.yaml
#
# The command prints the `root_cid`.  Set it as `root_cid` in config.
#
# Transport ACL is set at runtime via `--acl-file` (see default.acl).
# Kind definitions can be added inline under `kinds:` (optional).
#
# Prerequisites:
#   - IPFS Desktop (Kubo) must be running on localhost:5001
#   - Wasm plugin(s) already pinned to IPFS (get the CID from `ipfs add <plugin.wasm>`)

runtime:
  # Named entities — defined directly under `runtime:`, no `entities:` wrapper.
  # Each entity is a Wasm plugin stored on IPFS.
  # Addressed as did:ma:<runtime-ipns>#<name>  (the `#` is the DID-URL fragment).
  # Pin your Wasm file first:  ipfs add <plugin>.wasm
  "#rms":
    kind: /ma/stateless/python/0.0.1
    behavior_cid: QmeB6MAFZ5NTYQgKcPMQ8EimN5rZ6LhbVcirRxTN8t1zoG
    acl: ""   # empty = deny-all; set to a named ACL ref for access control
