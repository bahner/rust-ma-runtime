# Bootstrap a ma runtime with entities.
#
# Run once before starting the daemon:
#
#   ma --gen-root-cid bootstrap.example.yaml
#
# The command prints the `root_cid`.  Set it as `root_cid` in config.
#
# If `acl:` is set here, it is published to IPFS and used as the root
# transport-gate ACL at startup (unless `--acl-file` overrides it).
#
# Prerequisites:
#   - IPFS Desktop (Kubo) must be running on localhost:5001
#   - EntityNode(s) already published to IPFS:
#       ipfs dag put --store-codec dag-cbor entity.json
#     Use the resulting CID as the entity value below.

runtime:
  # Named group registry: name -> flat list of member DIDs, published to
  # IPFS at bootstrap. Referenced from any AclMap as principal `+<name>`,
  # CRUD-addressed as /grp/<name> once the daemon is running.
  #
  # "owners" is the runtime's authoritative owner list — same storage as any
  # other group, no special field. It is protected against deletion once the
  # daemon is running (may be set to an empty list, but the entry itself can
  # never be removed via CRUD) — see AGENTS.md "ACL groups".
  grp:
    owners:
      - did:ma:k51qzi5uqu5dlgh2drt9od7f7fmfe1u6rf5j2s2acfp9olltfx51oqhnl048xm
      - did:ma:k51qzi5uqu5dikd2qx9mpj3xguv89v6qhcnfnx2jb6yp4eby6iatr5xer8rn7t

  # Named ACL library: name -> inline AclMap, published to IPFS at bootstrap.
  # Reference an ACL by name in an EntityNode's `acl` field.
  acls:
    open:
      "*": ["*"]
    owners:
      "+owners": ["*"]
      "*": []

  # Root transport-gate ACL.
  # Published to IPFS at bootstrap; loaded at startup when no --acl-file is given.
  # Controls who may use the RPC, inbox, and IPFS services.
  # An absent acl: means the daemon falls back to --acl-file (or open access).
  #
  # `+owners` below resolves against the `grp.owners` list above — it is a
  # real, functional group reference (not a cosmetic stub): anyone listed in
  # grp.owners gets the capabilities granted here, and stays in sync
  # automatically as grp.owners is edited via CRUD.
  acl:
    "+owners": ["*"]
    "*":
      - ipfs
      - identity-publish
      - rpc


  # Kind definitions.
  # Flat map: full protocol ID string → kind descriptor (bootstrap input only).
  # The `protocol` field is omitted — the map key IS the protocol ID.
  # When published to IPFS, the runtime converts this to a nested tree so that
  # IPLD path traversal works:
  #   ipfs dag get .../kinds/ma/python/actor/0.0.1
  kinds:
    # Generic ma-scheme actor. One shared Wasm binary (`cid`) interprets
    # concatenated `.ma` source layers: this kind's stdlib `behaviour`, any
    # derived kind behaviour, then each entity's own `EntityNode.behaviour`.
    # There is no `api`/`lifecycle` field — every kind exports exactly
    # `on_message` + `on_signal`, always (ma-scheme-v1.md §3, §16).
    # Regenerate the `cid` below with (from rust-ma-scheme-actor):
    #   make actor.wasm && ipfs add --quieter actor.wasm
    /ma/scheme/actor/0.0.1:
      cid:
        "/": bafkreig5y3xyx3tewfegbfe5fclhhjnnyb4jnkgdp77naj4hzpjntbfdkm
      type: extism
      behaviour:
        "/": bafkreialwzyindzb53xgwchpnb5f6cuatrixbdmsbr3gkdykanbilq6ecy
      attributes:
        wasi: false
        stateful: true
      host_functions:
        - ma_reply
        - ma_set_state
        - ma_send
        - ma_ipfs_include
        # Temporary: lets any scheme-actor entity create new entities
        # directly via `(ma-create-actor kind behaviour init)` — a
        # pragmatic stand-in until a #root orchestrator exists. Governing
        # *who* may call this is an ACL concern, not a host_functions
        # concern.
        - ma_create_entity

    # A genesis/tree-root variant of the same kind — reuses the scheme actor
    # Wasm and stdlib behaviour via `extends`. Behaviour links compose
    # base-first; this kind adds no extra source layer of its own.
    /ma/genesis/0.0.1:
      extends: /ma/scheme/actor/0.0.1
      attributes:
        genesis: true
  
  # Entities — two forms are accepted:
  #
  #   inline:   bootstrap builds and publishes the EntityNode from the descriptor.
  #             `behaviour` is an IPLD link to the entity's own content — Wasm
  #             bytes for a kind with no shared `cid`, or `.ma` source text that
  #             is appended after all kind-level behaviour layers.
  #             `acl` references a named ACL from `acls:` above (empty = deny-all).
  entities:
  # #root, #house, #avatar deferred — add scheme-actor entities here later
  # (each needs its own published .ma source CID; see HOWTO.md Step 10).
