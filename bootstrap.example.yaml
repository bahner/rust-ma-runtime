# Bootstrap a ma runtime with entities.
#
# Run once before starting the daemon:
#
#   ma --gen-root-cid bootstrap.example.yaml
#
# The command prints the `root_cid`.  Set it as `root_cid` in config.
#
# If `acl:` is set here, it is published to IPFS and used as the root
# transport-gate ACL at startup (unless `--acl-file` overrides it).
#
# Prerequisites:
#   - IPFS Desktop (Kubo) must be running on localhost:5001
#   - EntityNode(s) already published to IPFS:
#       ipfs dag put --store-codec dag-cbor entity.json
#     Use the resulting CID as the entity value below.

runtime:
  # Root transport-gate ACL.
  # Published to IPFS at bootstrap; loaded at startup when no --acl-file is given.
  # Controls who may use the RPC, inbox, and IPFS services.
  # An absent acl: means the daemon falls back to --acl-file (or open access).
  owners:
    - did:ma:k51qzi5uqu5dlgh2drt9od7f7fmfe1u6rf5j2s2acfp9olltfx51oqhnl048xm
  acls:
    open:
      "*": ["*"]
  acl:
    +/owners: ["*"]
    "*":
      - ipfs
      - rpc


  # Kind definitions.
  # Flat map: full protocol ID string → kind descriptor (bootstrap input only).
  # The `protocol` field is omitted — the map key IS the protocol ID.
  # When published to IPFS, the runtime converts this to a nested tree so that
  # IPLD path traversal works:
  #   ipfs dag get .../kinds/ma/stateless/python/0.0.1
  kinds:
    /ma/stateless/python/0.0.1:
      attributes:
        stateful: false
        wasi: true
      api:
        - handle_message
      host_functions:
        - ma_reply
        - ma_send
    /ma/stateful/python/0.0.1:
      attributes:
        stateful: true
        wasi: true
      api:
        - init
        - handle_message
      host_functions:
        - ma_reply
        - ma_send
        - ma_set_state

    # ── Standard library kinds ────────────────────────────────────────────────
    # Root orchestrator — the only kind allowed to call ma_create_entity.
    /ma/root/0.0.1:
      attributes:
        wasi: true
      api:
        - init
        - handle_message
      host_functions:
        - ma_reply
        - ma_set_state
        - ma_send
        - ma_create_entity
        - ma_delete_entity
      allow:
        - create *

    # Bijective (two-way) key↔value map.
    # Reads are open to all; writes restricted to parent.
    /ma/register/0.0.1:
      attributes:
        stateful: true
      api:
        - init
        - handle_message
      host_functions:
        - ma_set_state
        - ma_reply
      allow:
        - "*"

    # Unordered unique-value collection.
    # Reads are open to all; writes restricted to parent.
    /ma/set/0.0.1:
      attributes:
        stateful: true
      api:
        - init
        - handle_message
      host_functions:
        - ma_set_state
        - ma_reply
      allow:
        - "*"

    # Atomic integer counter.
    /ma/counter/0.0.1:
      attributes:
        stateful: true
      api:
        - init
        - handle_message
      host_functions:
        - ma_set_state
        - ma_reply
      allow:
        - "*"


    # Clearing house — two-phase claim/accept placement authority.
    # Tracks who/what is where (containment tree).
    # Build: make -C ../ma-python/ma_runtime_house ipfs
    /ma/house/0.0.1:
      attributes:
        stateful: true
        wasi: true
      api:
        - init
        - handle_message
      host_functions:
        - ma_reply
        - ma_set_state
        - ma_send
      allow:
        - "*"

    # Room — social hub entity.
    # Build: make -C ../ma-python/ma_runtime_room ipfs
    /ma/room/0.0.1:
      attributes:
        stateful: true
        wasi: true
      api:
        - init
        - handle_message
      host_functions:
        - ma_reply
        - ma_set_state
        - ma_send
      allow:
        - "*"

    # Avatar identity registry — pseudonymous IDs + display names.
    # Build: make -C ../ma-python/ma_runtime_avatar ipfs
    /ma/avatar/0.0.1:
      attributes:
        stateful: true
        wasi: true
      api:
        - init
        - handle_message
      host_functions:
        - ma_reply
        - ma_set_state
        - ma_send
        - ma_avatar_id
      allow:
        - "*"

  # Entities — two forms are accepted:
  #
  #   inline:   bootstrap builds and publishes the EntityNode from the descriptor.
  #             `behaviour` is an IPLD link to the Wasm bytes already on IPFS.
  #             `acl` references a named ACL from `acls:` above (empty = deny-all).
  entities:
    # Root orchestrator — the single entry point for entity creation.
    # Build: make -C ../ma-python/ma_runtime_root ipfs
    root:
      kind: /ma/root/0.0.1
      behaviour:
        /: bafybeic2opv5s2mmkkl25ekgp6ulun4erc63ocqp4tsilsjhl5wr5pfnvm
      acl: open

    # Counter — atomic integer with :get/:set/:inc/:dec/:reset verbs.
    counter:
      kind: /ma/counter/0.0.1
      behaviour:
        /: bafkreibqd55px3nwvpk7ltdz4yovp33exc4jis6cxilbf6cicyfz3ftniy
      acl: open

    # Register — bijective key↔value map.
    register:
      kind: /ma/register/0.0.1
      behaviour:
        /: bafkreihth6wygd65kfdzj4gn3wh2gxudmnhegzwvqkvudo2soif24dsbqy
      acl: open

    # Set — unordered unique-value collection.
    set:
      kind: /ma/set/0.0.1
      behaviour:
        /: bafkreifkccobn75jdy4gpp5pcga6pvwcqribxnlaryb6jqjo7mi3a75qsm
      acl: open

    # Inline form — bootstrap builds and publishes the EntityNode.

    rms:
      kind: /ma/stateless/python/0.0.1
      behaviour:
        /: bafybeibjmr55vbj4wsaoyrsi3xq3fvywkiksj4pdfvfzhr5rnyxiluwp24
      acl: open

    # Avatar identity registry — pseudonymous IDs + display names.
    # Must be loaded before house (house calls #avatar:id at enter time).
    avatar:
      kind: /ma/avatar/0.0.1
      behaviour:
        /: bafybeidttvnnz4twcyvv4o4bqohjxscnp2yfsagjwtmqcwfpfszg3dg6qy
      acl: open

    # Clearing house — placement authority for the runtime world.
    house:
      kind: /ma/house/0.0.1
      behaviour:
        /: bafybeib3bfzxff4ykyru6iksr5obt3boxsfo6zzhi76sb5x7nd5w63ee4u
      acl: open

    # The common room.
    # Flow: @avatar:claim 💃  →  @house:enter #room  →  @room:enter <ticket>
    room:
      kind: /ma/room/0.0.1
      behaviour:
        /: bafybeiewmwsvzmxnfz7327ja4llidr4d5ghmnyptq7r6ovbqh2rw2zaybm
      acl: open
