# Generic "bring-your-own-compiled-actor" template for Python.
#
# Unlike avatar/house/room/root/counter/register/set (which each share ONE
# published Wasm binary across every entity of the kind), this kind has NO
# shared `cid` — every entity you create from it supplies its OWN,
# independently compiled Wasm binary via `EntityNode.behaviour` (see
# ma-runtime-v1.md §11.2/§14.1). `behaviour` here is raw Wasm bytes,
# instantiated as-is — never interpreted as text (that's the ma-scheme
# kind's job, /ma/scheme/actor/0.0.1).
#
# Copy this file, rename the protocol, and adjust attributes.stateful /
# host_functions to match your own actor's needs.
#
# `attributes.stateful: true` example (adjust host_functions to
# `[ma_send, ma_reply]` for a stateless actor instead):
protocol: /ma/python/actor/0.0.1
type: extism
attributes:
  wasi: true
  stateful: true
host_functions:
  - ma_reply
  - ma_set_state
  - ma_send
